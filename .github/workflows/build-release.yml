name: Build and Release Executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Validate code and imports
      run: |
        python -m py_compile main.py
        python -m py_compile core/python_detector.py
        python -m py_compile core/venv_manager.py
        python -m py_compile core/package_manager.py
        python -m py_compile core/windows_path.py
        python -m py_compile ui/main_window.py
        python -m py_compile ui/venv_panel.py
        python -m py_compile ui/package_panel.py
        python -m py_compile utils/helpers.py
        python -m py_compile utils/config.py
        echo "✓ All modules validated successfully"

  build:
    needs: test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller PyLite_Manager.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PyLiteManager-executable
        path: dist/PyLite_Manager/PyLite_Manager.exe
        retention-days: 30
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        target_commitish: ${{ github.sha }}
        generate_release_notes: true
        files: dist/PyLite_Manager/PyLite_Manager.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
